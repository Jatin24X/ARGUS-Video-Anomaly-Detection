name: CI Pipeline

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest fastapi[all] httpx

      - name: Run Python unit tests
        run: |
          pytest tests/ -v

  nextjs-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deployment/vercel_app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: deployment/vercel_app/package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Build Next.js project
        run: npm run build
        env:
          NEXT_PUBLIC_ARGUS_API_URL: https://jatinsheoran2412--argus-stream-a-api-argusapi-fastapi-app.modal.run
